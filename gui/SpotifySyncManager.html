/* ─── Micro components ───────────────────────────────────────────────────── */
function CoverArt({ artist = '?', idx = 0, size = 36 }) {
  const bg = COVER_PALETTE[idx % COVER_PALETTE.length];
  return (
    <div style={{
      width:size, height:size, borderRadius:4, flexShrink:0,
      background:bg, display:'flex', alignItems:'center', justifyContent:'center',
      fontSize:size*0.38, fontWeight:700, color:'rgba(0,0,0,0.65)',
      userSelect:'none', letterSpacing:'-0.02em',
    }}>
      {artist[0]?.toUpperCase() || '?'}
    </div>
  );
}

function YtThumb({ idx = 0, size = 96 }) {
  const bg = COVER_PALETTE[(idx + 5) % COVER_PALETTE.length];
  const h = Math.round(size * 0.5625);
  return (
    <div style={{
      width:size, height:h, borderRadius:4, flexShrink:0, overflow:'hidden',
      background:`linear-gradient(135deg, ${bg}55 0%, ${bg}22 100%)`,
      border:`1px solid ${bg}33`,

function ScoreBadge({ score }) {

  return (

      color:scoreColor(score), background:scoreBg(score),
      fontFamily:'monospace', whiteSpace:'nowrap',
    }}>
      {score}%
    </span>
  );
}

function LangBadge({ lang }) {
  const c = LANG_COLOR[lang] || '#888';
  return (
    <span style={{
      padding:'2px 7px', borderRadius:3, fontSize:10, fontWeight:700,
      color:c, background:`${c}1A`, letterSpacing:'0.04em',
      fontFamily:'monospace', whiteSpace:'nowrap',
    }}>
      {lang}
    </span>
  );
}

function StatusBadge({ status }) {
  const cfg = {
    exists:  { label:'✓ Existe',  c:'#1DB954' },
    missing: { label:'— Falta',   c:'#E22D44' },
    dubious: { label:'? Dudoso',  c:'#F59B23' },
  };
  const { label, c } = cfg[status] || cfg.missing;
  return (
    <span style={{
      padding:'2px 9px', borderRadius:3, fontSize:11, fontWeight:500,
      color:c, background:`${c}18`, whiteSpace:'nowrap',
    }}>
      {label}
    </span>
  );
}

function Btn({ children, variant='default', small, onClick, disabled, style:s = {} }) {
  const variants = {
    default: { bg:'var(--elevated)', color:'var(--text-2)', border:'1px solid var(--border)' },
    accent:  { bg:'var(--accent)',   color:'black',         border:'none' },
    green:   { bg:'var(--accent-bg)',color:'var(--accent)', border:'1px solid rgba(29,185,84,0.3)' },
    red:     { bg:'var(--red-bg)',   color:'var(--red)',    border:'1px solid rgba(226,45,68,0.3)' },
    ghost:   { bg:'transparent',     color:'var(--text-3)', border:'1px solid transparent' },
  };
  const v = variants[variant] || variants.default;
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      style={{
        padding: small ? '4px 10px' : '7px 14px',
        borderRadius:5, fontSize: small ? 11 : 12, fontWeight:600,
        cursor: disabled ? 'not-allowed' : 'pointer',
        opacity: disabled ? 0.4 : 1,
        display:'flex', alignItems:'center', justifyContent:'center', gap:5,
        transition:'filter 0.1s',
        ...v, ...s,
      }}
      onMouseEnter={e => { if (!disabled) e.currentTarget.style.filter = 'brightness(1.12)'; }}
      onMouseLeave={e => { e.currentTarget.style.filter = 'none'; }}
    >
      {children}
    </button>
  );
}

/* ─── Compare View ───────────────────────────────────────────────────────── */
function CompareView({ onAddToQueue }) {
  const [filterStatus, setFilterStatus] = useState('all');
  const [scanProgress] = useState(74);

  const stats = {
    total:   TRACKS.length,
    exists:  Object.values(PHONE_FILES).filter(f => f.status === 'exists').length,
    missing: Object.values(PHONE_FILES).filter(f => f.status === 'missing').length,
    dubious: Object.values(PHONE_FILES).filter(f => f.status === 'dubious').length,
  };

  const filtered = TRACKS.filter(t => {
    const f = PHONE_FILES[t.id];
    if (filterStatus === 'all')     return true;
    if (filterStatus === 'missing') return !f || f.status === 'missing';
    if (filterStatus === 'dubious') return f?.status === 'dubious';
    if (filterStatus === 'exists')  return f?.status === 'exists';
    return true;
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ padding:'18px 22px 14px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>

            <p style={{ color:'var(--text-3)', fontSize:11.5 }}>Spotify Playlist ↔ Teléfono Android · /snaptube/download/Snaptube Audio/</p>
          </div>
          <Btn variant="accent">
            <svg width="9" height="11" viewBox="0 0 9 11" fill="black"><path d="M0 0L9 5.5L0 11V0Z"/></svg>
            Escanear
          </Btn>
        </div>

        {/* Stats strip */}
        <div style={{ display:'flex', gap:10, alignItems:'center', marginBottom:14 }}>
          {[

/* ─── Download Queue ─────────────────────────────────────────────────────── */
function DownloadQueueView({ queue, setQueue, onYtSearch }) {
  const trackMap = Object.fromEntries(TRACKS.map(t => [t.id, t]));
  const pending   = queue.filter(q => q.status === 'pending').length;
  const approved  = queue.filter(q => q.status === 'approved').length;
  const rejected  = queue.filter(q => q.status === 'rejected').length;

  const setStatus = (id, status) => setQueue(q => q.map(item => item.id === id ? { ...item, status } : item));
  const approveAll = () => setQueue(q => q.map(item => item.status === 'pending' ? { ...item, status:'approved' } : item));

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ padding:'18px 22px 14px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
          <div>
            <h1 style={{ fontSize:17, fontWeight:700, letterSpacing:'-0.02em', marginBottom:2 }}>Cola de Descarga</h1>
            <p style={{ color:'var(--text-3)', fontSize:11.5 }}>
              <span style={{ color:'var(--yellow)' }}>{pending} pendientes</span>
              {' · '}
              <span style={{ color:'var(--accent)' }}>{approved} aprobadas</span>
              {rejected > 0 && <><span style={{ color:'var(--text-3)' }}> · </span><span style={{ color:'var(--red)' }}>{rejected} rechazadas</span></>}
            </p>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <Btn onClick={approveAll} variant="default">Aprobar todo</Btn>
            <Btn variant="accent" disabled={approved === 0} onClick={() => alert(`Iniciando descarga de ${approved} track(s)...`)}>
              <svg width="11" height="12" viewBox="0 0 11 12" fill="currentColor">
                <path d="M5.5 0v7.5M2 5l3.5 3.5L9 5M0 11h11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
              </svg>
              Descargar {approved > 0 ? `(${approved})` : ''}
            </Btn>
          </div>
        </div>
      </div>

      <div style={{ flex:1, overflow:'auto', padding:'12px 20px' }}>
        {queue.length === 0 ? (
          <div style={{ textAlign:'center', padding:'60px 0', color:'var(--text-3)' }}>
            <div style={{ fontSize:28, marginBottom:12 }}>📭</div>
            <div style={{ fontSize:13 }}>La cola está vacía</div>
            <div style={{ fontSize:11.5, marginTop:4 }}>Agrega tracks desde la vista Comparar</div>
          </div>
        ) : (
          <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
            {queue.map((item, i) => {
              const track = trackMap[item.trackId];
              if (!track) return null;
              const isApproved = item.status === 'approved';
              const isRejected = item.status === 'rejected';

              return (
                <div
                  key={item.id}
                  style={{
                    background:'var(--elevated)', borderRadius:8,
                    border:`1px solid ${isApproved ? 'rgba(29,185,84,0.28)' : isRejected ? 'rgba(226,45,68,0.2)' : 'var(--border)'}`,
                    opacity: isRejected ? 0.45 : 1,
                    overflow:'hidden', transition:'all 0.2s',
                    animation:'fadeIn 0.2s ease',
                  }}
                >
                  {isApproved && <div style={{ height:2, background:'var(--accent)' }} />}
                  <div style={{ padding:'10px 14px', display:'flex', alignItems:'center', gap:12 }}>
                    <CoverArt artist={track.artist} idx={i} size={38} />

                    {/* Track info */}
                    <div style={{ width:160, flexShrink:0 }}>
                      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
                        <span style={{ fontSize:12.5, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', maxWidth:120 }}>{track.name}</span>
                        <LangBadge lang={track.lang} />
                      </div>
                      <div style={{ fontSize:11, color:'var(--text-3)' }}>{track.artist}</div>
                    </div>

                    <div style={{ color:'var(--text-3)', fontSize:14, flexShrink:0 }}>→</div>

                    {/* YouTube video */}
                    <YtThumb size={90} idx={i} />

                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{
                        fontSize:11.5, fontWeight:500, marginBottom:3, lineHeight:1.3,
                        display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical',
                        overflow:'hidden',
                      }}>
                        {item.ytTitle}
                      </div>
                      <div style={{ fontSize:10.5, color:'var(--text-3)', marginBottom:6 }}>
                        {item.ytChannel} · {item.ytDur} · {item.ytViews} vistas
                      </div>
                      <ScoreBadge score={item.ytScore} />
                    </div>

                    {/* Action buttons */}
                    <div style={{ display:'flex', gap:5, flexShrink:0 }}>
                      <Btn variant="ghost" small onClick={() => onYtSearch(track, item)} style={{ fontSize:14, padding:'5px 7px' }} title="Buscar alternativa en YouTube">
                        🔍
                      </Btn>
                      <Btn
                        variant={isApproved ? 'green' : 'ghost'}
                        small
                        onClick={() => setStatus(item.id, isApproved ? 'pending' : 'approved')}
                        title={isApproved ? 'Quitar aprobación' : 'Aprobar'}
                        style={{ fontSize:14, padding:'5px 9px', fontWeight:800 }}
                      >
                        ✓
                      </Btn>
                      <Btn
                        variant={isRejected ? 'red' : 'ghost'}
                        small
                        onClick={() => setStatus(item.id, isRejected ? 'pending' : 'rejected')}
                        title={isRejected ? 'Restaurar' : 'Rechazar'}
                        style={{ fontSize:13, padding:'5px 9px', fontWeight:800 }}
                      >
                        ✕
                      </Btn>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── Process Monitor ────────────────────────────────────────────────────── */
const SCRIPTS = [
  { id:'generate_report',  label:'generate_report.py',  desc:'Comparar Spotify vs teléfono' },
  { id:'sync',             label:'sync.py',              desc:'Sync completo playlist → Android' },
  { id:'enrich_metadata',  label:'enrich_metadata.py',   desc:'Actualizar metadatos MP3 masivo' },
  { id:'download_missing', label:'download_missing.py',  desc:'Descargar desde reporte existente' },
  { id:'smart_compare',    label:'smart_compare.py',     desc:'Comparación fuzzy avanzada' },
  { id:'retry_failed',     label:'retry_failed.py',      desc:'Reintentar descargas fallidas' },
  { id:'dry_run',          label:'dry_run.py',           desc:'Preview de cambios sin modificar' },
  { id:'debug_song',       label:'debug_song.py',        desc:'Debug un track específico' },
];

const LOG_LEVEL_COLOR = { INFO:'#1DB954', WARNING:'#F59B23', ERROR:'#E22D44' };
const LOG_MSG_COLOR   = { INFO:'#A8C9A8', WARNING:'#E0C87A', ERROR:'#FF8A9A' };

function ProcessMonitorView() {
  const [script, setScript] = useState('generate_report');
  const [running, setRunning] = useState(false);
  const [progress, setProgress] = useState(0);
  const [logs, setLogs] = useState(INIT_LOGS);
  const logRef = useRef(null);
  const timerRef = useRef(null);

  useEffect(() => {
    if (logRef.current) {
      logRef.current.scrollTop = logRef.current.scrollHeight;
    }
  }, [logs]);

  const handleRun = useCallback(() => {
    setRunning(true);
    setProgress(0);
    const scriptLabel = SCRIPTS.find(s => s.id === script)?.label;
    const now = () => new Date().toLocaleTimeString('es-ES', { hour12:false });
    setLogs([{ t:now(), lv:'INFO', msg:`Ejecutando ${scriptLabel}...` }]);

    let p = 0;
    timerRef.current = setInterval(() => {
      p += 3 + Math.random() * 7;
      if (p >= 100) {
        p = 100;
        clearInterval(timerRef.current);
        setRunning(false);
        setLogs(l => [...l, { t:now(), lv:'INFO', msg:`✓ ${scriptLabel} completado (${l.length + 1} operaciones)` }]);
      }
      setProgress(Math.min(100, Math.floor(p)));
      const pool = LOG_POOL[Math.floor(Math.random() * LOG_POOL.length)];
      setLogs(l => [...l.slice(-200), { ...pool, t:now() }]);
    }, 700);
  }, [script]);

  const handleStop = () => {
    clearInterval(timerRef.current);
    setRunning(false);
    const now = new Date().toLocaleTimeString('es-ES', { hour12:false });
    setLogs(l => [...l, { t:now, lv:'WARNING', msg:'Proceso detenido por el usuario' }]);
  };

  useEffect(() => () => clearInterval(timerRef.current), []);

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100%', overflow:'hidden' }}>
      {/* Header */}
      <div style={{ padding:'18px 22px 14px', borderBottom:'1px solid var(--border)', flexShrink:0 }}>
        <h1 style={{ fontSize:17, fontWeight:700, letterSpacing:'-0.02em', marginBottom:2 }}>Monitor de Procesos</h1>
        <p style={{ color:'var(--text-3)', fontSize:11.5 }}>Ejecuta y visualiza los scripts Python en tiempo real</p>
      </div>

      <div style={{ flex:1, display:'flex', overflow:'hidden' }}>
        {/* Left: script picker */}
        <div style={{ width:228, borderRight:'1px solid var(--border)', padding:'10px 8px', display:'flex', flexDirection:'column', gap:2, flexShrink:0, overflowY:'auto' }}>
          <div style={{ fontSize:9.5, fontWeight:700, color:'var(--text-3)', letterSpacing:'0.08em', textTransform:'uppercase', padding:'4px 8px', marginBottom:4 }}>
            Scripts
          </div>
          {SCRIPTS.map(s => {
            const isSel = script === s.id;
            return (
              <div
                key={s.id}
                onClick={() => !running && setScript(s.id)}
                style={{
                  padding:'7px 10px', borderRadius:6,
                  cursor: running ? 'not-allowed' : 'pointer',
                  background: isSel ? 'var(--accent-bg)' : 'transparent',
                  border:`1px solid ${isSel ? 'rgba(29,185,84,0.25)' : 'transparent'}`,
                  opacity: running && !isSel ? 0.5 : 1,
                  transition:'all 0.12s',
                }}
              >
                <div style={{ fontSize:11.5, fontFamily:'monospace', color: isSel ? 'var(--accent)' : 'var(--text)', lineHeight:1.2 }}>
                  {s.label}
                </div>
                <div style={{ fontSize:10, color:'var(--text-3)', marginTop:2 }}>{s.desc}</div>
              </div>
            );
          })}
        </div>

        {/* Right: terminal */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
          {/* Toolbar */}
          <div style={{ padding:'9px 14px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:9, flexShrink:0 }}>
            {running ? (
              <Btn variant="red" small onClick={handleStop}>
                <div style={{ width:8, height:8, background:'var(--red)', borderRadius:1 }} />
                Detener
              </Btn>
            ) : (
              <Btn variant="accent" small onClick={handleRun}>
                <svg width="9" height="10" viewBox="0 0 9 10" fill="currentColor"><path d="M0 0L9 5L0 10V0Z"/></svg>
                Ejecutar
              </Btn>
            )}

            <Btn variant="ghost" small onClick={() => setLogs([])}>Limpiar</Btn>

            {running && (
              <div style={{ flex:1, display:'flex', alignItems:'center', gap:9 }}>
                <div style={{ flex:1, height:3, background:'var(--border)', borderRadius:2, overflow:'hidden' }}>
                  <div style={{
                    height:'100%', width:`${progress}%`,
                    background:'var(--accent)', borderRadius:2,
                    transition:'width 0.35s ease',
                  }} />
                </div>
                <span style={{ fontSize:11, color:'var(--text-2)', fontFamily:'monospace', width:34, textAlign:'right' }}>{progress}%</span>
                <div style={{ width:7, height:7, borderRadius:'50%', background:'var(--accent)', animation:'blink 0.9s infinite' }} />
              </div>
            )}

            {!running && (
              <span style={{ fontSize:10.5, color:'var(--text-3)', fontFamily:'monospace' }}>
                {logs.length} líneas · {SCRIPTS.find(s => s.id === script)?.label}
              </span>
            )}
          </div>

          {/* Log output */}
          <div
            ref={logRef}
            style={{
              flex:1, overflow:'auto', padding:'10px 14px',
              fontFamily:"'JetBrains Mono','Fira Code','Cascadia Code','Consolas',monospace",
              fontSize:11.5, lineHeight:1.75,
              background:'#090909',
            }}
          >
            {logs.length === 0 ? (
              <div style={{ color:'var(--text-3)', padding:'8px 0' }}>
                $ Selecciona un script y presiona Ejecutar
              </div>
            ) : (
              logs.map((line, idx) => (
                <div key={idx} style={{ display:'flex', gap:12, minHeight:20 }}>
                  <span style={{ color:'var(--text-3)', flexShrink:0, width:56 }}>{line.t}</span>
                  <span style={{
                    flexShrink:0, width:58,
                    color: LOG_LEVEL_COLOR[line.lv] || 'var(--text-3)',
                    fontWeight:700,
                  }}>
                    [{line.lv}]
                  </span>
                  <span style={{ color: LOG_MSG_COLOR[line.lv] || 'var(--text-2)', wordBreak:'break-word' }}>
                    {line.msg}
                  </span>
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── App root ───────────────────────────────────────────────────────────── */
function App() {
  const [view, setView]         = useState('compare');
  const [queue, setQueue]       = useState(INITIAL_QUEUE);
  const [ytTrack, setYtTrack]   = useState(null);
  const [ytItem, setYtItem]     = useState(null);

  const pendingCount = queue.filter(q => q.status === 'pending').length;

  const handleAddToQueue = useCallback((track) => {
    setQueue(q => {
      if (q.some(item => item.trackId === track.id)) return q;
      return [...q, {
        id: q.length + 10,
        trackId: track.id,
        ytTitle: `${track.artist} - ${track.name} (Official Audio)`,
        ytChannel: 'YouTube AutoSearch',
        ytDur: track.dur,
        ytViews: '—',
        ytScore: 0,
        status: 'pending',
      }];
    });
    setView('queue');
  }, []);

  const handleYtSearch = useCallback((track, item) => {
    setYtTrack(track);
    setYtItem(item);
  }, []);

  const handleSelectVideo = useCallback((ytId) => {
    if (!ytItem) return;
    const result = YT_RESULTS.find(r => r.id === ytId);
    if (!result) return;
    setQueue(q => q.map(item =>
      item.id === ytItem.id
        ? { ...item, ytTitle:result.title, ytChannel:result.channel, ytDur:result.dur, ytViews:result.views, ytScore:result.score }
        : item
    ));
  }, [ytItem]);

  const views = {
    compare:  <CompareView onAddToQueue={handleAddToQueue} />,
    queue:    <DownloadQueueView queue={queue} setQueue={setQueue} onYtSearch={handleYtSearch} />,
    monitor:  <ProcessMonitorView />,
    settings: <SettingsView />,
  };

  return (
    <>
      <Sidebar active={view} setActive={setView} queueCount={pendingCount} />
      <div style={{ flex:1, overflow:'hidden', background:'var(--surface)' }}>
        {views[view]}
      </div>
      {ytTrack && (
        <YouTubeSearchModal
          track={ytTrack}
          onClose={() => { setYtTrack(null); setYtItem(null); }}
          onSelectVideo={handleSelectVideo}
        />
      )}
    </>
  );
}

/* ─── Mount ──────────────────────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
